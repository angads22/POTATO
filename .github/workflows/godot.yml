name: Godot Check

on:
  push:
    branches: [main]
    paths: ['godot/**']
  pull_request:
    paths: ['godot/**']

env:
  GODOT_VERSION: 4.2.2

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot-bin
          key: godot-${{ env.GODOT_VERSION }}

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          curl -sL -o /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp
          mv "/tmp/Godot_v${GODOT_VERSION}-stable_linux.x86_64" ~/godot-bin/godot
          chmod +x ~/godot-bin/godot

      - name: Script compile check
        run: |
          cd godot
          ~/godot-bin/godot --headless --import . 2>&1 | tee import.log
          ! grep -q "SCRIPT ERROR" import.log

      - name: Headless gameplay smoke test
        run: |
          cd godot
          ~/godot-bin/godot --headless --path . res://tests/SmokeTest.tscn --quit-after 900 2>&1 | tee smoke.log
          grep -q "SMOKE OK" smoke.log
